version: '2.1'

services:
  greptimedb:
    image: greptime/greptimedb:v1.0.0-rc.1
    expose:
      - 4000
      - 4001
      - 4002
    networks:
      - e2e
    command:
      - standalone
      - start
      - --http-addr=0.0.0.0:4000
      - --rpc-bind-addr=0.0.0.0:4001
      - --mysql-addr=0.0.0.0:4002
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:4000/health"]
      interval: 5s
      timeout: 60s
      retries: 120

  oap:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: oap
    environment:
      SW_STORAGE: greptimedb
      SW_STORAGE_GREPTIMEDB_GRPC_ENDPOINTS: greptimedb:4001
      SW_STORAGE_GREPTIMEDB_JDBC_HOST: greptimedb
      SW_STORAGE_GREPTIMEDB_JDBC_PORT: 4002
      SW_STORAGE_GREPTIMEDB_DATABASE: public
    ports:
      - 12800
    depends_on:
      greptimedb:
        condition: service_healthy
    networks:
      - e2e

  provider:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: provider
    ports:
      - 9090
    depends_on:
      oap:
        condition: service_healthy
    networks:
      - e2e

  consumer:
    extends:
      file: ../../../script/docker-compose/base-compose.yml
      service: consumer
    ports:
      - 9092
    depends_on:
      oap:
        condition: service_healthy
      provider:
        condition: service_healthy
    networks:
      - e2e

networks:
  e2e:
