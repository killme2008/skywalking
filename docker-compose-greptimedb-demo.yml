version: '3.8'

services:
  greptimedb:
    image: greptime/greptimedb:v1.0.0-rc.1
    container_name: greptimedb
    ports:
      - "4000:4000"
      - "4001:4001"
      - "4002:4002"
    networks:
      - demo
    command:
      - standalone
      - start
      - --http-addr=0.0.0.0:4000
      - --rpc-bind-addr=0.0.0.0:4001
      - --mysql-addr=0.0.0.0:4002
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:4000/health"]
      interval: 5s
      timeout: 60s
      retries: 120

  oap:
    image: skywalking/oap:latest
    container_name: oap
    ports:
      - "11800:11800"
      - "12800:12800"
    networks:
      - demo
    depends_on:
      greptimedb:
        condition: service_healthy
    environment:
      SW_STORAGE: greptimedb
      SW_STORAGE_GREPTIMEDB_GRPC_ENDPOINTS: greptimedb:4001
      SW_STORAGE_GREPTIMEDB_JDBC_HOST: greptimedb
      SW_STORAGE_GREPTIMEDB_JDBC_PORT: 4002
      SW_STORAGE_GREPTIMEDB_DATABASE: skywalking
      SW_HEALTH_CHECKER: default
      SW_TELEMETRY: prometheus
      JAVA_OPTS: "-Xms1024m -Xmx1024m"
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/11800"]
      interval: 5s
      timeout: 60s
      retries: 120

  ui:
    image: ghcr.io/apache/skywalking/ui:latest
    container_name: ui
    ports:
      - "8080:8080"
    networks:
      - demo
    depends_on:
      oap:
        condition: service_healthy
    environment:
      SW_OAP_ADDRESS: http://oap:12800

  provider:
    image: ghcr.io/apache/skywalking-java/skywalking-java:2a61027e5eb74ed1258c764ae2ffeabd499416a6-java17
    container_name: provider
    volumes:
      - ./test/e2e-v2/java-test-service/e2e-service-provider/target/e2e-service-provider-2.0.0.jar:/services_provider.jar
    command: ["java", "-jar", "/services_provider.jar"]
    ports:
      - "9090:9090"
    networks:
      - demo
    depends_on:
      oap:
        condition: service_healthy
    environment:
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: oap:11800
      SW_LOGGING_OUTPUT: CONSOLE
      SW_AGENT_NAME: e2e-service-provider
      SW_AGENT_INSTANCE_NAME: provider1
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/9090"]
      interval: 5s
      timeout: 60s
      retries: 120

  consumer:
    image: ghcr.io/apache/skywalking-java/skywalking-java:2a61027e5eb74ed1258c764ae2ffeabd499416a6-java17
    container_name: consumer
    volumes:
      - ./test/e2e-v2/java-test-service/e2e-service-consumer/target/e2e-service-consumer-2.0.0.jar:/services_consumer.jar
    command: ["java", "-jar", "/services_consumer.jar"]
    ports:
      - "9092:9092"
    networks:
      - demo
    depends_on:
      oap:
        condition: service_healthy
      provider:
        condition: service_healthy
    environment:
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: oap:11800
      SW_LOGGING_OUTPUT: CONSOLE
      PROVIDER_URL: http://provider:9090
      SW_AGENT_NAME: e2e-service-consumer
      SW_AGENT_INSTANCE_NAME: consumer1
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/9092"]
      interval: 5s
      timeout: 60s
      retries: 120

networks:
  demo:
